<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>IPTV Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>
  <video id="player" controls width="640" height="360"></video>
  <script>
    const video = document.getElementById('player');
    const url = "http://gopower.click:80/0572801353/4028569088/99.m3u8";

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata', function () {
        video.play();
      });
    }
  </script>
  <h2>Filme / Vídeo</h2>
  <video width="640" height="360" controls>
    <source src="http://gopower.click:80/series/0572801353/4028569088/343693.mp4" type="video/mp4">
    Seu navegador não suporta HTML5 Video.
  </video>
</body>

</html>
